name: Build QRIS Bot APK

on:
  push:
    branches: [ main, master ]
  pull_request:
    branches: [ main, master ]
  # Bisa juga trigger manual dari GitHub web
  workflow_dispatch:

jobs:
  build:
    name: Build Debug APK
    runs-on: ubuntu-latest

    steps:
      # 1. Checkout kode
      - name: Checkout Repository
        uses: actions/checkout@v4

      # 2. Setup Java 17
      - name: Setup JDK 17
        uses: actions/setup-java@v4
        with:
          java-version: '17'
          distribution: 'temurin'
          cache: gradle

      # 3. Setup Android SDK
      - name: Setup Android SDK
        uses: android-actions/setup-android@v3

      # 4. Grant execute permission ke gradlew
      - name: Grant Gradlew Permission
        run: chmod +x android-app/gradlew

      # 5. Setup Gradle langsung (tidak butuh gradle-wrapper.jar)
      - name: Setup Gradle
        uses: gradle/actions/setup-gradle@v3
        with:
          gradle-version: '8.6'

      # 6. Build APK Debug
      - name: Build Debug APK
        working-directory: android-app
        run: gradle assembleDebug --no-daemon --stacktrace

      # 7. Upload APK sebagai artifact (bisa di-download dari GitHub)
      - name: Upload APK
        uses: actions/upload-artifact@v4
        with:
          name: qris-bot-debug-apk
          path: android-app/app/build/outputs/apk/debug/app-debug.apk
          retention-days: 30

      # 8. Tampilkan info APK
      - name: APK Info
        run: |
          APK_PATH="android-app/app/build/outputs/apk/debug/app-debug.apk"
          if [ -f "$APK_PATH" ]; then
            SIZE=$(du -sh "$APK_PATH" | cut -f1)
            echo "✅ Build berhasil!"
            echo "📦 Ukuran APK: $SIZE"
            echo "📍 Path: $APK_PATH"
          else
            echo "❌ APK tidak ditemukan!"
            exit 1
          fi
